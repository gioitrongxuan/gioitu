# Live-reload development stack — edit code WITHOUT rebuilding any image.
#
#   docker compose -f docker-compose.dev.yml up
#   → open http://localhost:5173   (Vite dev server with hot reload)
#
# The repo is bind-mounted into the containers, so changes under src/ are
# hot-reloaded by Vite and changes under server/ restart the backend (tsx
# watch). `node_modules` lives in a named volume per service so the host never
# clobbers the container's (possibly different-arch) install; deps are installed
# on first start and reused afterwards (delete the volume to force a reinstall:
# `docker compose -f docker-compose.dev.yml down -v`).
#
# This file is independent of the production docker-compose.yml — don't run both
# at once (they'd both want Postgres / the same ports).
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: gioitu
      POSTGRES_PASSWORD: gioitu
      POSTGRES_DB: gioitu
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gioitu -d gioitu"]
      interval: 5s
      timeout: 5s
      retries: 10

  # Backend (Express via tsx). `server:dev` watches server/ and auto-restarts.
  api:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "if [ ! -d node_modules/tsx ]; then npm ci; fi && npm run server:dev"
    environment:
      DATABASE_URL: postgres://gioitu:gioitu@db:5432/gioitu
      GIOITU_JWT_SECRET: ${GIOITU_JWT_SECRET:-dev-insecure-secret-change-me}
      PORT: "8787"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules   # keep the container's own node_modules
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8787:8787"                           # API reachable directly too

  # Frontend (Vite dev server with HMR). Proxies /api to the `api` service.
  web:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "if [ ! -d node_modules/vite ]; then npm ci; fi && npm run dev -- --host 0.0.0.0"
    environment:
      CHOKIDAR_USEPOLLING: "true"             # detect file changes over a bind mount
      VITE_PROXY_TARGET: http://api:8787      # /api → the api service (not localhost)
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    depends_on:
      - api
    ports:
      - "5173:5173"

volumes:
  pgdata:
  api_node_modules:
  web_node_modules:
